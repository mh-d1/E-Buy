<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Buy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1 id="site-title">E-Buy</h1> <!-- Ganti judul website di sini -->
        <nav>
            <ul>
                <li><a href="#home">Home</a></li> <!-- Ganti link menu -->
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section id="home">
            <h2>Selamat Datang!</h2>
            <p id="welcome-text">selamat datang di E-Buy</p>
        </section>

        <section id="about">
            <h2>E-Buy</h2>
            <p id="about-text">Beli barang impianmu dengan mudah, cepat, dan aman. Temukan produk terbaik hanya di sini.</p>
        </section>

        <section id="contact">
            <h2>hubungi kami di</h2>
            <form id="contact-form">
                <input type="text" placeholder="Nama" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Pesan"></textarea>
                <button type="submit">Kirim</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p id="footer-text">© 2026 E-Buy. Semua hak dilindungi.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
